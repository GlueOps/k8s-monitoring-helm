apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: glueops-developer-dashboards
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: "in-cluster"
    namespace: glueops-core-kube-prometheus-stack
  project: glueops-core
  syncPolicy:
    syncOptions:
      - Replace=true
    automated:
      prune: true
      selfHeal: true
    retry:
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m0s
      limit: 5
  source:
    repoURL: https://github.com/GlueOps/k8s-monitoring-helm.git
    path: developer-dashboards
    targetRevision: {{ .Values.developer_dashboards_target_revision | default "main" }}
    helm:
      skipCrds: true
